spring.application.name=Sale-Campaign-Management-System

# Database URL
spring.datasource.url=jdbc:mysql://localhost:3306/salecampaign?allowPublicKeyRetrieval=true&useSSL=false

# Database Username
spring.datasource.username=root

# Database Password
spring.datasource.password=Harsh@12345

# JDBC Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Automatically update tables
spring.jpa.hibernate.ddl-auto=update

# Format SQL
spring.jpa.properties.hibernate.format_sql=true

# Show SQL in console
spring.jpa.show-sql=true

# Spring prints mappings in console i
logging.level.org.springframework.web=DEBUG
